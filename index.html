// ========================================================
// STATE
// ========================================================
let state = {
  visitNumber: null,
  setIndex: null,
  currentTupleIndex: 0,
  answers: [],   // { tuple_id, query_id, rating } for each answered tuple
  sessionId: null,
  participantId: null,
};

// ========================================================
// INIT
// ========================================================
async function init() {
  // Generate session id
  state.sessionId = Date.now() + "_" + Math.random().toString(36).slice(2,8);
  state.participantId = "P_" + Math.random().toString(36).slice(2,10).toUpperCase();

  if (SCRIPT_URL) {
    document.getElementById("config-banner").style.display = "none";
    try {
      // Register visit and get visit number
      const res = await fetch(SCRIPT_URL + "?action=register&session=" + state.sessionId, { method: "GET" });
      const json = await res.json();
      state.visitNumber = json.visitNumber;
    } catch(e) {
      console.error("Failed to register visit:", e);
      // Fallback: use random number
      state.visitNumber = Math.floor(Math.random() * 1000) + 1;
    }
  } else {
    // Demo mode: random visit number
    state.visitNumber = Math.floor(Math.random() * 1000) + 1;
  }

  // n%20 gives 0-19, sets are 1-indexed
  state.setIndex = state.visitNumber % 20;  // 0-19
  const setData = ANNOTATION_SETS[state.setIndex];
  state.currentSet = setData;
  state.currentTupleIndex = 0;
  state.answers = new Array(setData.tuples.length).fill(null);

  document.getElementById("set-badge").textContent = "Set " + setData.set_id;

  // Hide loading, show app
  const loader = document.getElementById("loading-screen");
  loader.style.opacity = "0";
  setTimeout(() => {
    loader.style.display = "none";
    document.getElementById("app").style.display = "block";
    renderTuple();
  }, 400);
}

// ========================================================
// RENDER
// ========================================================
function renderTuple() {
  const set = state.currentSet;
  const tuples = set.tuples;
  const idx = state.currentTupleIndex;

  if (idx >= tuples.length) {
    renderCompletion();
    return;
  }

  const tuple = tuples[idx];
  const progress = state.answers.filter(a => a !== null).length;
  const pct = Math.round((progress / tuples.length) * 100);

  // Dots
  let dotsHtml = '<div class="tuple-nav">';
  tuples.forEach((_, i) => {
    let cls = "tuple-dot";
    if (state.answers[i] !== null) cls += " done";
    else if (i === idx) cls += " active";
    dotsHtml += `<div class="${cls}" onclick="goToTuple(${i})" title="Question ${i+1}"></div>`;
  });
  dotsHtml += '</div>';

  const currentRating = state.answers[idx];

  let scaleBtns = '';
  const labels = ['Completely\nDifferent', '', '', '', 'Essentially\nthe Same'];
  for (let v = 1; v <= 5; v++) {
    const sel = currentRating === v ? ' selected' : '';
    scaleBtns += `<button class="scale-btn${sel}" onclick="selectRating(${v})">${v}</button>`;
  }

  const html = `
    <div class="progress-section">
      <div>
        <div class="progress-label">Progress</div>
        <div class="progress-value">${progress}/${tuples.length}</div>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
      <div>
        <div class="progress-label">Set</div>
        <div class="progress-value" style="font-size:1.1rem">#${set.set_id}</div>
      </div>
      <div>
        <div class="progress-label">Participant</div>
        <div class="progress-value" style="font-size:.85rem;font-weight:600">${state.participantId}</div>
      </div>
    </div>

    ${dotsHtml}

    <div id="status-banner" class="status-banner"></div>

    <div class="question-card">
      <div class="question-header">
        <span class="q-label">Question ${idx + 1} of ${tuples.length}</span>
        <span class="q-id">QID ${tuple.query_id}</span>
      </div>
      <div class="question-body">
        <p class="question-text">${escHtml(tuple.question)}</p>
      </div>
    </div>

    <div class="answers-grid">
      <div class="answer-card">
        <div class="answer-card-header">
          <div class="answer-type-dot dot-ref"></div>
          <span class="answer-type-label label-ref">Reference Answer</span>
        </div>
        <div class="answer-body">${escHtml(tuple.reference_answer)}</div>
      </div>
      <div class="answer-card">
        <div class="answer-card-header">
          <div class="answer-type-dot dot-gen"></div>
          <span class="answer-type-label label-gen">Generated Answer</span>
        </div>
        <div class="answer-body">${escHtml(tuple.generated_answer)}</div>
      </div>
    </div>

    <div class="rating-section">
      <div class="rating-title">How similar are these two answers?</div>
      <div class="rating-subtitle">
        Read both answers above carefully and rate their semantic similarity on a scale of 1 to 5.
      </div>
      <div class="scale-row">
        ${scaleBtns}
      </div>
      <div class="scale-labels">
        <span>1 — Completely Different</span>
        <span>3 — Somewhat Similar</span>
        <span>5 — Essentially the Same</span>
      </div>
    </div>

    <div class="action-row">
      ${idx > 0 ? '<button class="btn btn-primary" onclick="prevTuple()" style="background:#555">← Previous</button>' : ''}
      <button class="btn btn-primary" id="next-btn" onclick="submitAndNext()" ${currentRating === null ? 'disabled' : ''}>
        ${idx === tuples.length - 1 ? 'Submit All ✓' : 'Save & Next →'}
      </button>
    </div>
  `;

  document.getElementById("main-content").innerHTML = html;
}

function renderCompletion() {
  document.getElementById("main-content").innerHTML = `
    <div class="completion-screen">
      <div class="completion-icon">🎉</div>
      <h2>All done! Thank you.</h2>
      <p>You've completed all ${state.currentSet.tuples.length} annotations for Set ${state.currentSet.set_id}.<br>
      Your responses have been recorded. You may close this page.</p>
      <br>
      <p style="font-size:.8rem;color:#999">Session: ${state.sessionId}<br>Participant: ${state.participantId}</p>
    </div>
  `;
}

// ========================================================
// INTERACTIONS
// ========================================================
function selectRating(v) {
  state.answers[state.currentTupleIndex] = v;
  renderTuple();
}

function goToTuple(i) {
  state.currentTupleIndex = i;
  renderTuple();
}

function prevTuple() {
  if (state.currentTupleIndex > 0) {
    state.currentTupleIndex--;
    renderTuple();
  }
}

async function submitAndNext() {
  const idx = state.currentTupleIndex;
  const tuple = state.currentSet.tuples[idx];
  const rating = state.answers[idx];
  if (rating === null) return;

  // Save to Google Sheet
  await saveResponse({
    sessionId: state.sessionId,
    participantId: state.participantId,
    visitNumber: state.visitNumber,
    setId: state.currentSet.set_id,
    tupleId: tuple.tuple_id,
    queryId: tuple.query_id,
    question: tuple.question,
    rating: rating,
    timestamp: new Date().toISOString()
  });

  // Check if last
  const allDone = state.answers.every(a => a !== null);
  if (idx === state.currentSet.tuples.length - 1 && allDone) {
    // Submit final summary too
    await saveSummary();
    state.currentTupleIndex++;
  } else {
    // Move to next unanswered or just next
    const nextUnanswered = state.answers.findIndex((a, i) => a === null && i > idx);
    if (nextUnanswered !== -1) {
      state.currentTupleIndex = nextUnanswered;
    } else {
      state.currentTupleIndex = Math.min(idx + 1, state.currentSet.tuples.length);
    }
  }
  renderTuple();
}

// ========================================================
// GOOGLE SHEETS API
// ========================================================
async function saveResponse(payload) {
  if (!SCRIPT_URL) {
    console.log("📊 Response (no Sheet configured):", payload);
    return;
  }
  try {
    showStatus("saving", "Saving...");
    const url = SCRIPT_URL + "?action=saveResponse&data=" + encodeURIComponent(JSON.stringify(payload));
    await fetch(url, { method: "GET" });
    showStatus("saved", "Saved ✓");
    setTimeout(() => hideStatus(), 1500);
  } catch(e) {
    console.error("Save failed:", e);
    showStatus("error", "Save failed — logged locally only.");
  }
}

async function saveSummary() {
  if (!SCRIPT_URL) return;
  const summary = {
    sessionId: state.sessionId,
    participantId: state.participantId,
    setId: state.currentSet.set_id,
    visitNumber: state.visitNumber,
    allRatings: state.answers,
    completedAt: new Date().toISOString()
  };
  try {
    const url = SCRIPT_URL + "?action=saveSummary&data=" + encodeURIComponent(JSON.stringify(summary));
    await fetch(url, { method: "GET" });
  } catch(e) { console.error("Summary save failed:", e); }
}

// ========================================================
// UI HELPERS
// ========================================================
function showStatus(type, msg) {
  const el = document.getElementById("status-banner");
  if (!el) return;
  el.className = "status-banner show " + type;
  el.textContent = msg;
}
function hideStatus() {
  const el = document.getElementById("status-banner");
  if (el) el.className = "status-banner";
}

function escHtml(str) {
  if (!str) return '';
  return str
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/\n/g, "<br>");
}

// Start
init();
</script>
</body>
</html>
